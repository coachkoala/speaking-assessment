<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Assessment</title>
</head>
<body>

<div class="sheet">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">SA</div>
      <div>
        <h1>Speaking Assessment</h1>
        <div class="sub">Small Talk Practice</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="session-chip" id="sessionNum"></div>
    </div>
  </div>

  <div class="card" id="setupCard">
    <div class="eyebrow">Practice Setup</div>

    <div class="section-title">Speaking Type</div>
    <div class="type-list" id="typeList"></div>

    <div class="section-title">Response Time</div>
    <div class="duration-select" id="durationSelect"></div>

    <button class="btn primary full" id="startPracticeBtn">Start Practice</button>
  </div>

  <div class="card" id="practiceCard" hidden>
    <button class="link-back" id="backToSetupBtn">← Change Type</button>
    <div class="eyebrow">Session Prompt</div>

    <div class="prompt-block">
      <div class="label">Topic</div>
      <div class="question" id="questionText"></div>
    </div>

    <div class="btn-row">
      <button class="btn secondary" id="newTopicBtn">New Topic</button>
      <button class="btn secondary" id="retryTopicBtn">Retry This Topic</button>
    </div>

    <div class="stage" id="stage">
      <div class="timer" id="timerDisplay">60</div>
      <div class="timer-label" id="timerLabel">seconds ready</div>
      <div class="wave idle" id="wave">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn primary" id="recordBtn" style="flex: 2 1 auto;">Start Recording</button>
      <button class="btn destructive" id="stopBtn" disabled>Stop Early</button>
    </div>

    <div class="status-line" id="statusLine">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Idle — press Start Recording when ready</span>
    </div>

    <div class="transcript-box empty" id="transcriptBox">
      Your transcript will appear here after you finish recording.
    </div>

    <div id="audioArea"></div>

    <div class="btn-row">
      <button class="btn primary full" id="analyzeBtn" disabled>Analyze My Speaking</button>
    </div>

    <div id="errorArea"></div>
    <div id="loadingArea"></div>
    <div id="reportArea"></div>
  </div>

  <footer>Transcribed & analyzed by AI · Not an official certification</footer>
</div>

<div class="share-overlay" id="shareOverlay" hidden>
  <div class="share-overlay-inner">
    <button class="share-close" id="shareCloseBtn" aria-label="Close">×</button>
    <div class="share-card-preview">
      <canvas id="shareCardCanvas" width="1080" height="1920"></canvas>
    </div>
    <div class="btn-row">
      <button class="btn secondary" id="shareDownloadBtn">Download</button>
      <button class="btn primary" id="shareSendBtn">Share</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>

</body>
</html>
